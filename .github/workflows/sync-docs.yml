name: Weekly sync Chinese docs

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  models: read
  pages: write
  id-token: write

concurrency:
  group: weekly-docs-sync
  cancel-in-progress: false

jobs:
  sync-build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Incrementally sync, verify, and build docs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TRANSLATION_MODEL: openai/gpt-4.1
        run: node scripts/sync-upstream.mjs

      - name: Commit synchronized documentation
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content app/generated-docs.json public/docs-images
          git commit -m "docs: sync Pi Chinese documentation"
          git push

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist-pages

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
